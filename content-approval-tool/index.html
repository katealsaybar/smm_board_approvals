<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tara Rose — Content Approval</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#2D2E37; --ink:#232430; --lavender:#C4B5FD; --rose:#FFD4D9;
    --white:#FAF8F3; --muted:rgba(250,248,243,0.55); --border:rgba(250,248,243,0.09);
    --display:'Cormorant Garamond',serif; --body:'DM Sans',sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--white);
    font-family:var(--body), -apple-system, sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:40px 20px; text-align:center; gap:36px;
  }
  .brand-logo{height:44px; width:auto; display:block;}
  .brand-sub{
    font-family:var(--body); font-size:12px;
    font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
    margin-top:10px;
  }
  .links{display:flex; gap:20px; flex-wrap:wrap; justify-content:center;}
  a.card{
    display:block; width:220px; padding:24px 20px; border-radius:16px;
    border:1px solid var(--border); background:rgba(70,72,83,0.4);
    color:var(--white); text-decoration:none;
  }
  a.card:hover{background:rgba(70,72,83,0.6);}
  a.card .emoji{font-size:28px; display:block; margin-bottom:10px;}
  a.card b{font-size:15px;}
  a.card small{display:block; margin-top:6px; font-size:12px; color:var(--muted);}
</style>
</head>
<body>
  <div>
    <img src="assets/tara-rose-logo.png" alt="Tara Rose Salon" class="brand-logo">
    <div class="brand-sub">Content Approval</div>
  </div>
  <div class="links">
    <a class="card" href="view/index.html">
      <span class="emoji">🗂️</span>
      <b>Review Tool</b>
      <small>Kate · Coach Emma · Tara — approve or send back</small>
    </a>
    <a class="card" href="upload/upload.html">
      <span class="emoji">⬆️</span>
      <b>Upload Tool</b>
      <small>Jules — add photos/videos for review</small>
    </a>
  </div>
</body>
</html>
